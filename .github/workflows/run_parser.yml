name: Run Parser

on:
  schedule:
    - cron: '0 6 * * 0'  # Каждое воскресенье в 6 утра UTC
  workflow_dispatch:

jobs:
  run-parser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run parser
        run: python schedule_parser.py

      - name: Check CSV output
        run: cat planer.csv

      - name: Send CSV to Google Apps Script
        run: |
          RESPONSE=$(curl -s -X POST -H "Content-Type: text/csv" --data-binary @planer.csv "https://script.google.com/macros/s/AKfycbw-G38enfjcCHUCAlg3vLSgFpXVqkcOBff4fItIdM-mJ_Qz5JQcFLeY4dTzj9Q_K8p4wg/exec")
          echo "Google Apps Script response: $RESPONSE"
